name: CD Pipeline - Build, Push & Deploy

# Triggers on merge to main/dev/test/prod
on:
  push:
    branches:
      - main
      - dev
      - test
      - prod

env:
  DOCKER_IMAGE: shwetang95/spring-microservice
  GITOPS_REPO: Shway95/spring-microservice-gitops
  APP_NAME: spring-microservice

jobs:
  build-test-scan:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build application
        run: gradle build --no-daemon

      - name: Run tests
        run: gradle test --no-daemon

      - name: Generate test coverage
        run: gradle jacocoTestReport --no-daemon

      # Secret Scanning
      - name: Gitleaks - Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tag
      - name: Generate image tag
        id: meta
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="${BRANCH}-${SHORT_SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      # Generate semantic version
      - name: Generate semantic version
        id: version
        run: |
          # Get the latest tag (semantic version)
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            # No tags yet, start at v1.0.0
            NEW_VERSION="v1.0.0"
          else
            # Increment patch version (v1.2.3 -> v1.2.4)
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "🏷️ New version: $NEW_VERSION"

      # Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }} ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.tag }}

      # Scan Docker image for vulnerabilities
      - name: Trivy - Image Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL'

      # Push to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}
          docker push ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.tag }}
          docker tag ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }} ${{ env.DOCKER_IMAGE }}:latest
          docker push ${{ env.DOCKER_IMAGE }}:latest

  update-gitops:
    name: Update GitOps Repo
    needs: build-test-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Determine environment
        id: env
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          if [ "$BRANCH" = "prod" ]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "test" ]; then
            echo "env=test" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Update image tag in GitOps repo
        run: |
          cd gitops/${{ steps.env.outputs.env }}/${{ env.APP_NAME }}
          sed -i "s|image:.*|image: ${{ env.DOCKER_IMAGE }}:${{ needs.build-test-scan.outputs.version }}|" deployment.yml
          echo "Updated ${{ env.APP_NAME }} image to: ${{ needs.build-test-scan.outputs.version }}"

      - name: Commit and push
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy ${{ needs.build-test-scan.outputs.version }} to ${{ steps.env.outputs.env }}"
          git push

  health-check:
    name: Post-Deploy Health Check
    needs: update-gitops
    runs-on: ubuntu-latest
    steps:
      - name: Wait for ArgoCD sync
        run: sleep 60

      - name: Health check
        run: |
          echo "Waiting for ArgoCD to sync and deploy..."
          echo "In a real setup, you would curl your app's health endpoint:"
          echo "curl -f http://your-app-url/actuator/health"
          # curl -f http://your-app-url/actuator/health || exit 1

  notify:
    name: Pipeline Summary
    needs: [build-test-scan, update-gitops]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print deployment summary
        run: |
          echo "=========================================="
          echo "  DEPLOYMENT SUMMARY"
          echo "=========================================="
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Version: ${{ needs.build-test-scan.outputs.version }}"
          echo "Image Tag: ${{ needs.build-test-scan.outputs.image_tag }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Build: ${{ needs.build-test-scan.result }}"
          echo "GitOps Update: ${{ needs.update-gitops.result }}"
          echo "=========================================="
          if [ "${{ needs.build-test-scan.result }}" = "success" ] && [ "${{ needs.update-gitops.result }}" = "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Pipeline failed!"
            exit 1
          fi

  create-tag:
    name: Create Version Tag
    needs: [build-test-scan, update-gitops]
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          VERSION="${{ needs.build-test-scan.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION - Branch: ${{ github.ref_name }}, SHA: ${{ github.sha }}"
          git push origin "$VERSION"
          echo "🏷️ Tagged: $VERSION"
