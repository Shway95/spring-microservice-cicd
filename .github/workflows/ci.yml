name: CI Pipeline - Build & Test

# Triggers on any push to feature branches (not main/dev/test/prod)
on:
  push:
    branches-ignore:
      - main
      - dev
      - test
      - prod
  pull_request:
    branches:
      - main
      - dev
      - test
      - prod

jobs:
  build-and-test:
    name: Build, Test & Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarCloud

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build application
        run: gradle build --no-daemon

      - name: Run tests
        run: gradle test --no-daemon

      - name: Generate test coverage report
        run: gradle jacocoTestReport --no-daemon

      # Secret Scanning
      - name: Gitleaks - Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build Docker image (test only - don't push)
      - name: Build Docker image (test)
        run: docker build -t spring-microservice:test .

      # Scan Docker image for vulnerabilities
      - name: Trivy - Image Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'spring-microservice:test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'
